version: '3.9'

services:
  web:
    build:
      context: .
      target: runner
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  web-dev:
    build:
      context: .
      target: deps
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - '3001:3000'
    environment:
      - NODE_ENV=development
    command: npm run dev
    profiles:
      - dev
